name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Run Tests
      run: |
        # Clear any old cached data
        npm run setup:mysql || true
        # Run tests with the 'ci' flag
        npm test -- --ci --detectOpenHandles
      env:
        NODE_ENV: test
        DB_HOST: 127.0.0.1
        DB_USER: testuser
        DB_PASSWORD: testpass
        DB_NAME: testdb
        DB_PORT: 3306

    - name: Install dependencies
      run: npm install

    - name: Fix permissions
      run: chmod +x node_modules/.bin/*

    - name: Wait for MySQL
      run: |
        sudo apt-get install -y mysql-client
        until mysqladmin ping -h"127.0.0.1" -utestuser -ptestpass --silent; do
          echo "Waiting for MySQL database to start..."
          sleep 2
        done

    - name: Run Database Setup and Tests
      run: |
        # Uncomment the line below if you have a custom setup script
        # npm run setup:mysql 
        npm test
      env:
        NODE_ENV: test
        DB_HOST: 127.0.0.1
        DB_USER: testuser
        DB_PASSWORD: testpass
        DB_NAME: testdb
        DB_PORT: 3306

    - name: Run Tests
      run: |
        npm run setup:mysql
        sleep 5
        npm test

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
