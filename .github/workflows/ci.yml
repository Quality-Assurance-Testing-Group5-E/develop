name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Verify cross-env and Fix Permissions
      run: |
        ls -d node_modules/cross-env || echo "cross-env not found"
        chmod -R +x node_modules/.bin || true

    - name: Wait for MySQL
      run: |
        sudo apt-get install -y mysql-client
        until mysqladmin ping -h"127.0.0.1" -utestuser -ptestpass --silent; do
          echo "Waiting for MySQL database to start..."
          sleep 2
        done

    - name: Run Database Setup and Tests
      run: |
        # Initialize the database schema
        npm run setup:mysql || true
        # Wait for tables to settle
        sleep 5
        # Run tests using npx to avoid path issues
        npm test
      env:
        NODE_ENV: test
        DB_HOST: 127.0.0.1
        DB_USER: testuser
        DB_PASSWORD: testpass
        DB_NAME: testdb
        DB_PORT: 3306

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
