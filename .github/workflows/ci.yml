name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    # 1. Upgraded to v6 to fix Node 20 deprecation warnings
    - name: Checkout code
      uses: actions/checkout@v6

    # 2. Upgraded to v6 and Node 24 for 2026 compatibility
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    # 3. Use 'npm ci' instead of 'install' for a clean, reliable CI build
    - name: Install dependencies
      run: npm ci

    # 4. CRITICAL: Rebuild sqlite3 specifically for this Linux runner
    - name: Rebuild native modules
      run: npm rebuild sqlite3

    - name: Verify cross-env and Fix Permissions
      run: |
        ls -d node_modules/cross-env || echo "cross-env not found"
        chmod -R +x node_modules/.bin || true

    - name: Wait for MySQL
      run: |
        sudo apt-get install -y mysql-client
        until mysqladmin ping -h"127.0.0.1" -utestuser -ptestpass --silent; do
          echo "Waiting for MySQL database to start..."
          sleep 2
        done

    - name: Run Database Setup and Tests
      run: |
        npm run setup:mysql || true
        sleep 5
        npm test
      env:
        NODE_ENV: test
        DB_HOST: 127.0.0.1
        DB_USER: testuser
        DB_PASSWORD: testpass
        DB_NAME: testdb
        DB_PORT: 3306

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4 # Upgraded version
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false